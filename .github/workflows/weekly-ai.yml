name: weekly-ai-recommend

on:
  schedule:
    - cron: '20 9 * * 5'   # 금요일 18:20 KST (09:20 UTC) — 데일리 수집 이후
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-ai
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install openai

      - run: python recommend.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit recommendations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/recommendations.json
          git diff --cached --quiet || git commit -m "ai: $(TZ=Asia/Seoul date +'%Y-%m-%d') 주간 추천"
          git push
